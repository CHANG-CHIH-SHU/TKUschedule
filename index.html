<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassCalendar — 互動式課表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="app-container">
        <!-- Sidebar: File/Department selector -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>ClassCalendar</h2>
                <p>淡江大學排課輔助系統</p>
            </div>

            <div class="filter-section">
                <label for="department-select">選擇系所 / 類別</label>
                <select id="department-select">
                    <option value="" disabled selected>請選擇...</option>
                </select>

                <div class="search-box">
                    <input type="text" id="course-search" placeholder="搜尋課程名稱或教師...">
                </div>
            </div>

            <div class="course-list-header">
                <h3>課程列表</h3>
                <span id="course-count">0 筆</span>
            </div>

            <div id="course-list">
                <!-- Course cards injected by JS -->
                <div class="empty-state">請選擇系所以顯示課程</div>
            </div>
        </aside>

        <!-- Main Content: Timetable -->
        <main id="main-content">
            <div class="main-header">
                <h1>我的課表</h1>
                <div class="header-actions">
                    <button id="free-time-toggle" class="btn-toggle">🕐 空閒篩選</button>
                    <button id="clear-free-slots-btn" class="btn-secondary hidden">清除空閒</button>
                    <button id="view-selected-list-btn" class="btn-secondary">📋 已選清單</button>
                    <div class="credits-counter">已選 <strong id="total-credits">0</strong> 學分</div>
                    <button id="clear-schedule-btn" class="btn-secondary">清空課表</button>
                </div>
            </div>
            <div id="free-time-hint" class="free-time-hint hidden">
                💡 點擊課表上的<strong>空白格</strong>來標記您有空的時段，左側課程列表會自動篩選出完全符合的課程。
            </div>

            <div class="timetable-container">
                <table id="timetable">
                    <thead>
                        <tr>
                            <th class="time-col">節次 \ 星期</th>
                            <th>週一</th>
                            <th>週二</th>
                            <th>週三</th>
                            <th>週四</th>
                            <th>週五</th>
                        </tr>
                    </thead>
                    <tbody id="timetable-body">
                        <!-- 10 rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Conflict Alert Modal -->
    <div id="conflict-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>⚠️ 排課衝突</h3>
            </div>
            <div class="modal-body">
                <p id="conflict-message"></p>
            </div>
            <div class="modal-footer">
                <button id="conflict-close-btn" class="btn-primary">確定</button>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="details-title"></h3>
                <span id="details-badge" class="badge"></span>
            </div>
            <div class="modal-body" id="details-content">
            </div>
            <div class="modal-footer">
                <button id="details-remove-btn" class="btn-danger">從課表移除</button>
                <button id="details-close-btn" class="btn-secondary">關閉</button>
            </div>
        </div>
    </div>

    <!-- Selected Courses List Modal -->
    <div id="selected-list-modal" class="modal-overlay hidden">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>📋 已選課程清單</h3>
            </div>
            <div class="modal-body" id="selected-list-content">
            </div>
            <div class="modal-footer">
                <button id="selected-list-close-btn" class="btn-primary">關閉</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
