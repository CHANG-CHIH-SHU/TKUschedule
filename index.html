<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKUschedule — 互動式課表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="app-container">
        <!-- Sidebar: File/Department selector -->
        <aside id="sidebar" class="glass-panel">
            <div class="sidebar-header">
                <h2>TKUschedule</h2>
                <p>淡江大學排課輔助系統</p>
            </div>

            <div class="filter-section">
                <label for="department-select">選擇系所 / 類別</label>
                <div class="select-wrapper">
                    <select id="department-select">
                        <option value="" disabled selected>請選擇...</option>
                    </select>
                    <i data-lucide="chevron-down" class="select-icon"></i>
                </div>

                <label for="grade-select" style="margin-top: 12px;">選擇年級</label>
                <div class="select-wrapper">
                    <select id="grade-select" disabled>
                        <option value="" selected>全部年級</option>
                    </select>
                    <i data-lucide="chevron-down" class="select-icon"></i>
                </div>

                <div class="search-box" style="margin-top: 16px;">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="course-search" placeholder="搜尋課程、教師或開課序號...">
                </div>
            </div>

            <div class="course-list-header">
                <h3>課程列表</h3>
                <span id="course-count" class="glass-badge">0 筆</span>
            </div>

            <div id="course-list">
                <!-- Course cards injected by JS -->
                <div class="empty-state">
                    <i data-lucide="inbox"></i>
                    <p>請選擇系所以顯示課程</p>
                </div>
            </div>
        </aside>

        <!-- Main Content: Timetable -->
        <main id="main-content">
            <div class="main-header">
                <h1>我的課表</h1>
                <div class="header-actions">
                    <button id="free-time-toggle" class="btn-toggle">
                        <i data-lucide="clock-4"></i> 空閒篩選
                    </button>
                    <button id="clear-free-slots-btn" class="btn-secondary hidden">
                        <i data-lucide="eraser"></i> 清除空閒
                    </button>
                    <button id="view-selected-list-btn" class="btn-secondary">
                        <i data-lucide="list-checks"></i> 已選清單
                    </button>
                    <button id="export-btn" class="btn-secondary">
                        <i data-lucide="upload"></i> 匯出代碼
                    </button>
                    <button id="import-btn" class="btn-secondary">
                        <i data-lucide="download"></i> 匯入代碼
                    </button>
                    <div class="credits-counter">
                        已選 <strong id="total-credits">0</strong> 學分
                    </div>
                    <button id="clear-schedule-btn" class="btn-secondary">
                        <i data-lucide="trash-2"></i> 清空課表
                    </button>
                </div>
            </div>
            <div id="free-time-hint" class="free-time-hint hidden">
                <i data-lucide="lightbulb" class="hint-icon"></i>
                <span>點擊課表上的<strong>空白格</strong>來標記您有空的時段，左側將自動篩選出符合的課程。</span>
            </div>

            <div class="timetable-container glass-panel">
                <table id="timetable">
                    <thead>
                        <tr>
                            <th class="time-col">節次 \ 星期</th>
                            <th>週一</th>
                            <th>週二</th>
                            <th>週三</th>
                            <th>週四</th>
                            <th>週五</th>
                        </tr>
                    </thead>
                    <tbody id="timetable-body">
                        <!-- 10 rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Conflict Alert Modal -->
    <div id="conflict-modal" class="modal-overlay hidden">
        <div class="modal glass-modal">
            <div class="modal-header text-danger">
                <h3><i data-lucide="alert-triangle"></i> 排課衝突</h3>
            </div>
            <div class="modal-body">
                <p id="conflict-message"></p>
            </div>
            <div class="modal-footer">
                <button id="conflict-close-btn" class="btn-primary">確定</button>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal-overlay hidden">
        <div class="modal glass-modal">
            <div class="modal-header">
                <h3 id="details-title"></h3>
                <span id="details-badge" class="badge"></span>
            </div>
            <div class="modal-body" id="details-content">
            </div>
            <div class="modal-footer">
                <button id="details-remove-btn" class="btn-danger"><i data-lucide="filter-x"></i> 移除</button>
                <button id="details-close-btn" class="btn-secondary">關閉</button>
            </div>
        </div>
    </div>

    <!-- Selected Courses List Modal -->
    <div id="selected-list-modal" class="modal-overlay hidden">
        <div class="modal modal-lg glass-modal">
            <div class="modal-header">
                <h3><i data-lucide="list"></i> 已選課程清單</h3>
            </div>
            <div class="modal-body" id="selected-list-content">
            </div>
            <div class="modal-footer">
                <button id="selected-list-close-btn" class="btn-primary">關閉</button>
            </div>
        </div>
    </div>

    <!-- Export Code Modal -->
    <div id="export-modal" class="modal-overlay hidden">
        <div class="modal glass-modal">
            <div class="modal-header">
                <h3><i data-lucide="upload"></i> 匯出課表代碼</h3>
            </div>
            <div class="modal-body">
                <p class="modal-hint">複製下方代碼，分享給朋友即可還原相同的課表。</p>
                <div class="code-output-wrapper">
                    <textarea id="export-code-output" readonly rows="4"></textarea>
                    <button id="copy-code-btn" class="btn-copy" title="複製代碼">
                        <i data-lucide="copy"></i>
                    </button>
                </div>
                <div id="export-course-summary" class="code-summary"></div>
            </div>
            <div class="modal-footer">
                <button id="export-close-btn" class="btn-primary">關閉</button>
            </div>
        </div>
    </div>

    <!-- Import Code Modal -->
    <div id="import-modal" class="modal-overlay hidden">
        <div class="modal glass-modal">
            <div class="modal-header">
                <h3><i data-lucide="download"></i> 匯入課表代碼</h3>
            </div>
            <div class="modal-body">
                <p class="modal-hint">貼上由他人分享的課表代碼，即可還原相同的課表。</p>
                <textarea id="import-code-input" rows="4" placeholder="在此貼上課表代碼..."></textarea>
                <div id="import-error" class="import-error hidden"></div>
            </div>
            <div class="modal-footer">
                <button id="import-close-btn" class="btn-secondary">取消</button>
                <button id="import-confirm-btn" class="btn-primary"><i data-lucide="check"></i> 匯入</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize static icons first, dynamic icons will be handled in app.js
        lucide.createIcons();
    </script>
</body>

</html>
